<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Вопрос про Марину</title>
    <style>
        * {
            user-select: none;
        }

        body {
            font-family: system-ui, -apple-system, 'Segoe UI', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            margin: 0;
            padding: 20px;
            position: relative;
            overflow-x: hidden;
        }

        /* Контейнер, который будет прыгать */
        .question-card {
    position: absolute;
    background: rgba(255,255,255,0.95);
    border-radius: 20px;
    padding: 20px;
    width: 70%;
    max-width: 300px;
    box-shadow: 0 20px 40px rgba(0,0,0,0.3);
    }

        .question-text {
            font-size: 1.1rem;
            font-weight: bold;
            text-align: center;
            margin-bottom: 18px;
            color: #333;
            line-height: 1.4;
        }

        .question-text span {
            color: #ff1493;
            font-size: 1.5rem;
        }

        .buttons {
            display: flex;
            gap: 8px;
            justify-content: center;
            flex-wrap: wrap;
        }

        button {
            padding: 12px 20px;
            font-size: 1rem;
            font-weight: bold;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
        }

        button:active {
            transform: scale(0.96);
        }

        .btn-yes {
            background: #ff1493;
            color: white;
            box-shadow: 0 4px 15px rgba(255,20,147,0.3);
        }

        .btn-yes:hover {
            background: #db1180;
        }

        .btn-no {
            background: #444;
            color: white;
        }

        .btn-no:hover {
            background: #333;
        }

        .btn-gift {
            background: linear-gradient(135deg, #f5af19, #f12711);
            color: white;
        }

        .btn-gift:hover {
            transform: scale(1.05);
        }

        /* Всплывающее окно (модальное) */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.7);
            justify-content: center;
            align-items: center;
            z-index: 1000;
            animation: fadeIn 0.3s;
        }

        .modal-content {
            background: white;
            padding: 30px;
            border-radius: 30px;
            max-width: 350px;
            text-align: center;
            box-shadow: 0 20px 40px rgba(0,0,0,0.3);
            animation: bounce 0.4s;
        }

        .modal-content p {
            font-size: 1.2rem;
            margin: 0 0 20px 0;
            color: #333;
            line-height: 1.5;
        }

        .modal-close {
            background: #667eea;
            padding: 10px 25px;
            color: white;
            border: none;
            border-radius: 50px;
            font-size: 1rem;
            cursor: pointer;
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        @keyframes bounce {
            0% { transform: scale(0.8); opacity: 0; }
            100% { transform: scale(1); opacity: 1; }
        }

        /* Анимация для рандомного перемещения */
        @keyframes shake {
            0%, 100% { transform: translate(0, 0) rotate(0deg); }
            25% { transform: translate(10px, -10px) rotate(5deg); }
            50% { transform: translate


(-10px, 15px) rotate(-5deg); }
            75% { transform: translate(5px, -5px) rotate(3deg); }
        }

        .move-animation {
            animation: shake 0.5s ease-in-out;
        }

        /* Красивый фон */
        .heart-bg {
            position: fixed;
            bottom: 10px;
            right: 10px;
            font-size: 1.5rem;
            opacity: 0.3;
            pointer-events: none;
        }

        .question-card {
        width: 75%;
        padding: 15px;
    }
    .question-text {
        font-size: 0.95rem;
    }
    button {
        padding: 8px 12px;
        font-size: 0.8rem;
    }
}
    </style>
</head>
<body>

<div class="question-card" id="questionCard">
    <div class="question-text">
         <span>Марина А.</span> 

        самая красивая и пиздатая девушка в мире?
    </div>
    <div class="buttons">
        <button class="btn-yes" id="btnYes">1 - Да</button>
        <button class="btn-no" id="btnNo">2 - Нет</button>
        <button class="btn-gift" id="btnGift">3 - Подарить ей Iphone 17 pro max</button>
    </div>
</div>

<div class="heart-bg">
    My Lover
</div>

<!-- Модальное окно -->
<div id="modal" class="modal">
    <div class="modal-content">
        <p id="modalMessage"></p>
        <button class="modal-close" onclick="closeModal()">Закрыть</button>
    </div>
</div>

<script>
    const card = document.getElementById('questionCard');
    const btnYes = document.getElementById('btnYes');
    const btnNo = document.getElementById('btnNo');
    const btnGift = document.getElementById('btnGift');
    const modal = document.getElementById('modal');
    const modalMessage = document.getElementById('modalMessage');

   function moveCardRandom() {
    const windowWidth = window.innerWidth;
    const windowHeight = window.innerHeight;
    const cardWidth = card.offsetWidth;
    const cardHeight = card.offsetHeight;

    const maxX = Math.max(10, windowWidth - cardWidth - 20);
    const maxY = Math.max(10, windowHeight - cardHeight - 20);
    
    const randomX = Math.random() * maxX;
    const randomY = Math.random() * maxY;

    card.style.transition = 'none';
    
    card.style.left = randomX + 'px';
    card.style.top = randomY + 'px';
}

    // Функция для показа модального окна
    function showModal(message) {
        modalMessage.innerText = message;
        modal.style.display = 'flex';
    }

    function closeModal() {
        modal.style.display = 'none';
    }

    // Закрытие модалки по клику вне контента
    modal.addEventListener('click', function(e) {
        if (e.target === modal) {
            closeModal();
        }
    });

    // 1. Кнопка "Да"
    btnYes.addEventListener('click', function() {
        showModal("Естественно, Вы правы. Она что то с чем то. Взрывная девушка 💥");
    });

    // 2. Кнопка "Нет"
    btnNo.addEventListener('click', function() {
        showModal("Ой, кажется умственно отсталый человек выбрал не тот ответ. Пожалуйста, используйте голову хоть раз помимо еды. 🧠🍔");
    });

    // 3. Кнопка "Подарить ей Iphone 17 pro max" - перемещаем карточку
    btnGift.addEventListener('click', function() {
        moveCardRandom();
    });

    // Устанавливаем начальное положение карточки по центру (смещение от левого верхнего угла)
    function setInitialPosition() {
        const windowWidth = window.innerWidth;
        const windowHeight = window.innerHeight;
        const cardWidth = card.offsetWidth;
        const cardHeight = card.offsetHeight;
        
        const startX = (windowWidth / 2) - (cardWidth / 2);
        const startY = (windowHeight / 2) - (cardHeight / 2);
        
        card.style.left = Math.max(10, startX) + 'px';
        card.style.top = Math.max(10, startY) + 'px';


}
    
    // При загрузке ставим по центру
    window.addEventListener('load', setInitialPosition);
    
    // При изменении размера окна — корректируем позицию (чтобы не улетала за границы)
    window.addEventListener('resize', function() {
        const currentLeft = parseFloat(card.style.left);
        const currentTop = parseFloat(card.style.top);
        const windowWidth = window.innerWidth;
        const windowHeight = window.innerHeight;
        const cardWidth = card.offsetWidth;
        const cardHeight = card.offsetHeight;
        
        let newLeft = currentLeft;
        let newTop = currentTop;
        
        if (currentLeft + cardWidth > windowWidth - 10) {
            newLeft = windowWidth - cardWidth - 10;
        }
        if (currentLeft < 10) {
            newLeft = 10;
        }
        if (currentTop + cardHeight > windowHeight - 10) {
            newTop = windowHeight - cardHeight - 10;
        }
        if (currentTop < 10) {
            newTop = 10;
        }
        
        card.style.left = newLeft + 'px';
        card.style.top = newTop + 'px';
    });
</script>

</body>
</html>
